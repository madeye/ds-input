name: Release

# Cut a release by pushing a tag:  git tag v0.1.0 && git push origin v0.1.0
#
# Builds the Windows universal installer (x64 + ARM64) and the macOS installer,
# then publishes a GitHub release with both attached. Both are **ad-hoc signed**
# — the Windows .exe is fully usable (Windows has no notarization); the macOS
# .zip is a build artifact only: an ad-hoc IME will NOT register in System
# Settings, so replace the macOS asset on the release with a locally-built,
# Developer ID-signed + notarized installer before sharing it.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: # build the installers on demand (no release is published)

permissions:
  contents: write # the release job creates the GitHub release + uploads assets

jobs:
  windows-installer:
    name: Windows installer (x64 + ARM64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc, aarch64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      # CMake's VS-generator auto-discovery fails on the runner ("could not find
      # any instance of Visual Studio") from a plain shell. Instead set up the
      # MSVC env per-arch with msvc-dev-cmd and build each arch with the Ninja
      # (single-config) generator, which takes the target arch from that env.
      - name: Set up MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Build core + TSF (x64)
        shell: pwsh
        working-directory: windows
        run: ./build.ps1 -Arch x64 -Config Release -Generator Ninja
      - name: Set up MSVC (ARM64 cross)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64
      - name: Build core + TSF (arm64)
        shell: pwsh
        working-directory: windows
        run: ./build.ps1 -Arch arm64 -Config Release -Generator Ninja
      # Package the universal installer (always x64) with the x64 env active.
      - name: Set up MSVC (x64) for installer
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Package universal installer
        shell: pwsh
        working-directory: windows
        run: ./installer/build-installer.ps1 -SkipBuild -Config Release -Generator Ninja
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: windows/installer/build/DSInputInstaller.exe
          if-no-files-found: error

  macos-installer:
    name: macOS installer (ad-hoc)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: Install XcodeGen
        run: brew install xcodegen
      # Pre-build the core staticlib so it exists at xcodebuild planning time.
      # The Xcode project references core/target/release/libdsime.a as a link
      # input; on a clean runner it doesn't exist yet, and Xcode plans the link
      # before running the cargo pre-build script phase → "Build input file
      # cannot be found". Building it up front sidesteps that ordering.
      - name: Pre-build core staticlib
        run: cargo build --release --manifest-path core/Cargo.toml
      # No SIGN_IDENTITY in the environment → build.sh / build-installer.sh
      # ad-hoc sign. --zip emits DSInputInstaller.zip next to the .app.
      - name: Build installer (ad-hoc, zipped)
        run: bash macos/Installer/build-installer.sh --zip
      - uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: macos/Installer/build/DSInputInstaller.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: [windows-installer, macos-installer]
    # Only publish a release for tag pushes; workflow_dispatch just builds.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      # Give the assets version-stamped, platform-clear names.
      - name: Stage release assets
        run: |
          mkdir -p out
          cp "artifacts/windows-installer/DSInputInstaller.exe" \
             "out/DSInputInstaller-${GITHUB_REF_NAME}-windows-x64-arm64.exe"
          cp "artifacts/macos-installer/DSInputInstaller.zip" \
             "out/DSInputInstaller-${GITHUB_REF_NAME}-macos.zip"
      - uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## DS Input ${{ github.ref_name }}

            | Platform | Asset | Notes |
            |----------|-------|-------|
            | Windows (x64 + ARM64) | `DSInputInstaller-${{ github.ref_name }}-windows-x64-arm64.exe` | Universal elevated installer. |
            | macOS | `DSInputInstaller-${{ github.ref_name }}-macos.zip` | **Ad-hoc CI build — replace with the Developer ID-signed + notarized installer before distributing.** |
